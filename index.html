<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Thuis">
  <meta name="theme-color" content="#f5f5f0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Thuis — Leen & Jente</title>
  <style>
    :root{
      --bg:#f5f5f0;--surface:#fff;--surface2:#f0efe9;
      --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);
      --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;
      --accent-l:#1a5fd4;--accent-l-bg:#e8f0fc;
      --accent-j:#0f6e56;--accent-j-bg:#e1f5ee;
      --purple:#534ab7;--purple-bg:#eeedfe;
      --green:#3b6d11;--green-bg:#eaf3de;
      --pink:#993556;--pink-bg:#fbeaf0;
      --red:#c0392b;--red-bg:#fdecea;
      --radius:16px;--radius-sm:10px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#18181a;--surface:#242426;--surface2:#2e2e30;
      --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);
      --text:#f0f0ea;--text2:#a0a09a;--text3:#6a6a64;
      --accent-l:#6b9ff0;--accent-l-bg:#1a2d4a;
      --accent-j:#4db89a;--accent-j-bg:#0d2d24;
      --purple:#9b94e8;--purple-bg:#1e1a40;
      --green:#7db84a;--green-bg:#152208;
      --pink:#ed93b1;--pink-bg:#2d0f1e;
      --red:#e06060;--red-bg:#2d1515;
    }}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
    .topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:44px 16px 0;}
    .topbar-inner{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .avatars{display:flex;}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
    .avatar-l{background:var(--accent-l-bg);color:var(--accent-l);}
    .avatar-j{background:var(--accent-j-bg);color:var(--accent-j);margin-left:-6px;border:2px solid var(--bg);}
    .app-title{font-size:17px;font-weight:600;}
    .sync-status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
    .sync-dot.ok{background:var(--green);}
    .sync-dot.saving{background:#f39c12;animation:pulse .8s infinite;}
    .sync-dot.error{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .tabs{display:flex;gap:6px;padding-bottom:8px;}
    .tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border-strong);font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .18s;-webkit-appearance:none;flex:1;text-align:center;}
    .tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
    .content{padding:4px 14px calc(90px + var(--safe-bottom));}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}
    .slabel{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin:10px 2px 5px;}
    .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:10px;}
    .list-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);}
    .list-item:last-child{border-bottom:none;}
    .list-item.done{opacity:.4;}
    .drag-handle{width:20px;height:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px;flex-shrink:0;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;}
    .drag-handle span{display:block;width:12px;height:2px;background:var(--border-strong);border-radius:1px;pointer-events:none;}
    .list-item.is-dragging{opacity:.3;}
    .list-item.drag-over-top{border-top:2px solid var(--accent-l);}
    .list-item.drag-over-bottom{border-bottom:2px solid var(--accent-l);}
    .drag-ghost{position:fixed;pointer-events:none;z-index:9999;background:var(--surface);border-radius:10px;padding:8px 14px;font-size:14px;color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.12);}
    .check-btn{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-strong);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-appearance:none;}
    .check-btn.checked{background:var(--green);border-color:var(--green);}
    .check-btn.checked::after{content:'';display:block;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
    .item-text{flex:1;font-size:14px;}
    .item-text.done{text-decoration:line-through;color:var(--text3);}
    .item-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0;}
    .badge-l{background:var(--accent-l-bg);color:var(--accent-l);}
    .badge-j{background:var(--accent-j-bg);color:var(--accent-j);}
    .badge-both{background:var(--pink-bg);color:var(--pink);}
    .delete-btn{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none;opacity:0;}
    .list-item:hover .delete-btn{opacity:1;}
    .delete-btn:hover{background:var(--red-bg);color:var(--red);}
    .filter-bar{display:flex;gap:5px;margin-bottom:6px;overflow-x:auto;scrollbar-width:none;}
    .filter-bar::-webkit-scrollbar{display:none;}
    .filter-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border-strong);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);white-space:nowrap;-webkit-appearance:none;}
    .filter-pill.active{background:var(--surface2);color:var(--text);border-color:var(--text);font-weight:500;}
    .add-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px calc(12px + var(--safe-bottom));background:var(--bg);border-top:1px solid var(--border);z-index:10;}
    .add-bar-inner{display:flex;gap:7px;align-items:center;}
    .add-input{flex:1;padding:10px 13px;font-size:14px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);-webkit-appearance:none;}
    .add-input:focus{outline:none;border-color:var(--accent-l);}
    .add-btn{padding:10px 14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:18px;cursor:pointer;line-height:1;}
    .assign-select{padding:10px 9px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);-webkit-appearance:none;appearance:none;min-width:60px;text-align:center;}
    .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
    .empty{text-align:center;padding:28px;color:var(--text3);font-size:14px;}
    .clear-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 2px;margin-bottom:4px;}

    #pw-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
    #pw-screen.hidden{display:none;}
    .pw-title{font-size:24px;font-weight:700;margin-bottom:8px;}
    .pw-sub{font-size:14px;color:var(--text2);margin-bottom:32px;text-align:center;}
    .pw-avatars{display:flex;margin-bottom:24px;}
    .pw-input{width:100%;max-width:280px;padding:14px 16px;font-size:16px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);text-align:center;letter-spacing:2px;margin-bottom:12px;-webkit-appearance:none;}
    .pw-input:focus{outline:none;border-color:var(--accent-l);}
    .pw-btn{width:100%;max-width:280px;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;}
    .pw-error{font-size:13px;color:#c0392b;margin-top:8px;display:none;}

  </style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-avatars">
    <div class="avatar avatar-l" style="width:44px;height:44px;font-size:15px;">L</div>
    <div class="avatar avatar-j" style="width:44px;height:44px;font-size:15px;margin-left:-8px;border:2px solid var(--bg);">J</div>
  </div>
  <div class="pw-title">Thuis</div>
  <div class="pw-sub">Voer het wachtwoord in om verder te gaan</div>
  <input class="pw-input" type="password" id="pw-input" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="pw-btn" onclick="checkPw()">Inloggen</button>
  <div class="pw-error" id="pw-error">Verkeerd wachtwoord, probeer opnieuw.</div>
</div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="avatars">
      <div class="avatar avatar-l">L</div>
      <div class="avatar avatar-j">J</div>
    </div>
    <div class="app-title">Thuis</div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">—</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('boodschappen',this)">Boodschappen</button>
    <button class="tab" onclick="showTab('taken',this)">Taken</button>
  </div>
</div>
<div class="content">
  <div class="tab-panel active" id="panel-boodschappen">
    <div class="filter-bar">
      <button class="filter-pill active" onclick="setBoodFilter('alle',this)">Alle</button>
      <button class="filter-pill" onclick="setBoodFilter('open',this)">Te kopen</button>
      <button class="filter-pill" onclick="setBoodFilter('klaar',this)">In kar</button>
    </div>
    <div id="bood-list"></div>
    <button class="clear-btn" onclick="clearDoneBood()">Verwijder aangekochte items</button>
  </div>
  <div class="tab-panel" id="panel-taken">
    <div class="filter-bar">
      <button class="filter-pill active" onclick="setTaakFilter('alle',this)">Alle</button>
      <button class="filter-pill" onclick="setTaakFilter('leen',this)">Leen</button>
      <button class="filter-pill" onclick="setTaakFilter('jente',this)">Jente</button>
      <button class="filter-pill" onclick="setTaakFilter('open',this)">Open</button>
      <button class="filter-pill" onclick="setTaakFilter('klaar',this)">Klaar</button>
    </div>
    <div id="taak-list"></div>
    <button class="clear-btn" onclick="clearDoneTaken()">Verwijder afgewerkte taken</button>
  </div>
</div>

<div class="add-bar" id="add-bar-bood">
  <div class="add-bar-inner">
    <input class="add-input" type="text" id="bood-input" placeholder="Item toevoegen..." onkeydown="if(event.key==='Enter')addBood()">
    <button class="add-btn" onclick="addBood()">+</button>
  </div>
</div>
<div class="add-bar" id="add-bar-taken" style="display:none;">
  <div class="add-bar-inner">
    <select class="assign-select" id="taak-assign">
      <option value="leen">L</option>
      <option value="jente">J</option>
      <option value="beide">L+J</option>
    </select>
    <input class="add-input" type="text" id="taak-input" placeholder="Taak toevoegen..." onkeydown="if(event.key==='Enter')addTaak()">
    <button class="add-btn" onclick="addTaak()">+</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://dqbkvhmgzzemvgalnygu.supabase.co';
const SUPABASE_KEY='sb_publishable_CKC0TPbuZwwHMvxkZJNc2A_Ca8qppwJ';
const headers={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

let state={boodschappen:[],taken:[]};
let boodFilter='alle',taakFilter='alle';
let saveTimer=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function setSS(s,l){document.getElementById('sync-dot').className='sync-dot '+s;document.getElementById('sync-label').textContent=l;}

async function loadFromSupabase(){
  setSS('saving','laden...');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/thuis?id=eq.main&select=data`,{headers});
    if(!res.ok)throw new Error();
    const rows=await res.json();
    if(rows.length){const d=rows[0].data;if(d.boodschappen)state.boodschappen=d.boodschappen;if(d.taken)state.taken=d.taken;}
    render();setSS('ok','gesynchroniseerd');
  }catch{setSS('error','fout bij laden');render();}
}

async function saveToSupabase(){
  setSS('saving','opslaan...');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/thuis?id=eq.main`,{method:'PATCH',headers,body:JSON.stringify({data:state,updated_at:new Date().toISOString()})});
    if(!res.ok)throw new Error();
    setSS('ok','opgeslagen');
  }catch{setSS('error','niet opgeslagen');}
}

function scheduleSave(){clearTimeout(saveTimer);setSS('saving','opslaan...');saveTimer=setTimeout(saveToSupabase,1000);}

// Poll for changes every 8 seconds
setInterval(async()=>{
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/thuis?id=eq.main&select=data`,{headers});
    if(!res.ok)return;
    const rows=await res.json();
    if(!rows.length)return;
    const d=rows[0].data;
    const newB=JSON.stringify(d.boodschappen||[]);
    const newT=JSON.stringify(d.taken||[]);
    if(newB!==JSON.stringify(state.boodschappen)||newT!==JSON.stringify(state.taken)){
      state.boodschappen=d.boodschappen||[];state.taken=d.taken||[];
      render();setSS('ok','bijgewerkt');
    }
  }catch{}
},8000);

function addBood(){
  const input=document.getElementById('bood-input');
  const text=input.value.trim();if(!text)return;
  state.boodschappen.push({id:uid(),text,done:false});
  input.value='';render();scheduleSave();
}
function toggleBood(id){const item=state.boodschappen.find(b=>b.id===id);if(item)item.done=!item.done;render();scheduleSave();}
function deleteBood(id){state.boodschappen=state.boodschappen.filter(b=>b.id!==id);render();scheduleSave();}
function clearDoneBood(){state.boodschappen=state.boodschappen.filter(b=>!b.done);render();scheduleSave();}
function setBoodFilter(f,btn){boodFilter=f;document.querySelectorAll('#panel-boodschappen .filter-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');render();}

function addTaak(){
  const input=document.getElementById('taak-input');
  const text=input.value.trim();if(!text)return;
  const assign=document.getElementById('taak-assign').value;
  state.taken.push({id:uid(),text,assign,done:false});
  input.value='';render();scheduleSave();
}
function toggleTaak(id){const item=state.taken.find(t=>t.id===id);if(item)item.done=!item.done;render();scheduleSave();}
function deleteTaak(id){state.taken=state.taken.filter(t=>t.id!==id);render();scheduleSave();}
function clearDoneTaken(){state.taken=state.taken.filter(t=>!t.done);render();scheduleSave();}
function setTaakFilter(f,btn){taakFilter=f;document.querySelectorAll('#panel-taken .filter-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');render();}

function render(){
  let bood=state.boodschappen;
  if(boodFilter==='open')bood=bood.filter(b=>!b.done);
  if(boodFilter==='klaar')bood=bood.filter(b=>b.done);
  const doneCount=state.boodschappen.filter(b=>b.done).length;
  const total=state.boodschappen.length;
  const pct=total?Math.round(doneCount/total*100):0;
  let boodHtml=total?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:'';
  if(!bood.length){boodHtml+=`<div class="empty">🛒 ${boodFilter==='alle'?'Voeg je eerste item toe!':'Geen items hier.'}</div>`;}
  else{boodHtml+='<div class="card">'+bood.map(b=>`
    <div class="list-item ${b.done?'done':''}" data-id="${b.id}" data-type="bood">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <button class="check-btn ${b.done?'checked':''}" onclick="toggleBood('${b.id}')"></button>
      <span class="item-text ${b.done?'done':''}">${esc(b.text)}</span>
      <button class="delete-btn" onclick="deleteBood('${b.id}')">×</button>
    </div>`).join('')+'</div>';}
  document.getElementById('bood-list').innerHTML=boodHtml;

  const badgeClass={leen:'badge-l',jente:'badge-j',beide:'badge-both'};
  const badgeLabel={leen:'Leen',jente:'Jente',beide:'Samen'};
  let taken=state.taken;
  if(taakFilter==='leen')taken=taken.filter(t=>t.assign==='leen');
  if(taakFilter==='jente')taken=taken.filter(t=>t.assign==='jente');
  if(taakFilter==='open')taken=taken.filter(t=>!t.done);
  if(taakFilter==='klaar')taken=taken.filter(t=>t.done);
  let taakHtml='';
  if(!taken.length){taakHtml=`<div class="empty">✅ ${taakFilter==='alle'?'Geen taken! Genieten.':'Geen taken hier.'}</div>`;}
  else{taakHtml='<div class="card">'+taken.map(t=>`
    <div class="list-item ${t.done?'done':''}" data-id="${t.id}" data-type="taak">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <button class="check-btn ${t.done?'checked':''}" onclick="toggleTaak('${t.id}')"></button>
      <span class="item-text ${t.done?'done':''}">${esc(t.text)}</span>
      <span class="item-badge ${badgeClass[t.assign]}">${badgeLabel[t.assign]}</span>
      <button class="delete-btn" onclick="deleteTaak('${t.id}')">×</button>
    </div>`).join('')+'</div>';}
  document.getElementById('taak-list').innerHTML=taakHtml;
}

function showTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');btn.classList.add('active');
  document.getElementById('add-bar-bood').style.display=name==='boodschappen'?'block':'none';
  document.getElementById('add-bar-taken').style.display=name==='taken'?'block':'none';
}

// Drag to reorder
let drag={active:false,item:null,type:null,srcId:null,ghost:null,offsetY:0};

function getOver(x,y,type){
  const els=document.elementsFromPoint(x,y);
  return els.find(el=>el.classList.contains('list-item')&&el!==drag.item&&el.dataset.type===type);
}
function clearDragStyles(){document.querySelectorAll('.list-item.drag-over-top,.list-item.drag-over-bottom').forEach(el=>el.classList.remove('drag-over-top','drag-over-bottom'));}
function doMove(targetEl,y,type){
  const arr=type==='bood'?state.boodschappen:state.taken;
  const r=targetEl.getBoundingClientRect();
  const before=y<r.top+r.height/2;
  const si=arr.findIndex(x=>x.id===drag.srcId);
  const[moved]=arr.splice(si,1);
  const ti=arr.findIndex(x=>x.id===targetEl.dataset.id);
  arr.splice(before?ti:ti+1,0,moved);
  render();scheduleSave();
}

document.addEventListener('touchstart',e=>{
  const h=e.target.closest('.drag-handle');if(!h)return;
  const item=h.closest('.list-item');if(!item)return;
  e.preventDefault();
  const t=e.touches[0];const r=item.getBoundingClientRect();
  drag={active:true,item,type:item.dataset.type,srcId:item.dataset.id,offsetY:t.clientY-r.top};
  item.classList.add('is-dragging');
  drag.ghost=document.createElement('div');drag.ghost.className='drag-ghost';
  drag.ghost.textContent=item.querySelector('.item-text').textContent;
  drag.ghost.style.cssText=`width:${r.width-32}px;top:${t.clientY-drag.offsetY}px;left:16px;`;
  document.body.appendChild(drag.ghost);
},{passive:false});

document.addEventListener('touchmove',e=>{
  if(!drag.active)return;e.preventDefault();
  const ty=e.touches[0].clientY;
  drag.ghost.style.top=(ty-drag.offsetY)+'px';
  clearDragStyles();
  const over=getOver(e.touches[0].clientX,ty,drag.type);
  if(over){const r=over.getBoundingClientRect();over.classList.add(ty<r.top+r.height/2?'drag-over-top':'drag-over-bottom');}
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!drag.active)return;
  const t=e.changedTouches[0];
  drag.ghost.remove();drag.item.classList.remove('is-dragging');clearDragStyles();
  const over=getOver(t.clientX,t.clientY,drag.type);
  if(over)doMove(over,t.clientY,drag.type);
  drag={active:false,item:null,type:null,srcId:null,ghost:null,offsetY:0};
});


const PW = 'LeenJente2025';
function checkPw(){
  const val=document.getElementById('pw-input').value;
  if(val===PW){
    localStorage.setItem('thuis_auth','1');
    document.getElementById('pw-screen').classList.add('hidden');
  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
  }
}
if(localStorage.getItem('thuis_auth')==='1'){
  document.getElementById('pw-screen').classList.add('hidden');
}

render();
